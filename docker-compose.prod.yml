services:
  # db foi removido — este projeto agora usa o Postgres compartilhado
  # definido em ericsantos.eu/infra/docker-compose.yml (container
  # infra_postgres, rede infra_shared). POSTGRES_USER/POSTGRES_DB devem ser
  # "banco" (role já criado lá) e POSTGRES_PASSWORD igual a
  # BANCO_DB_PASSWORD no infra/.env — veja infra/README.md.
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@infra_postgres:5432/${POSTGRES_DB}
      PDF_ROOT: /data/pdf
      UPLOAD_ROOT: /data/uploads
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env (openssl rand -hex 32)}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?defina ADMIN_EMAIL no .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD no .env}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:?defina FRONTEND_ORIGIN no .env, ex. https://banco.ericsantos.eu}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - uploads:/data/uploads
    networks:
      - default
      - infra_shared

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8090}:80"   # só localhost — nginx do host faz o proxy
    depends_on:
      - backend

networks:
  infra_shared:
    external: true

volumes:
  uploads:
